global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'trilho-api'
    static_configs:
      - targets: ['api:8080']
    metrics_path: /metrics
    # Key metrics to watch:
    # trilho_data_freshness_seconds{source="..."} — staleness per data source
    # trilho_scraper_success_total{scraper="..."} — scraper success count
    # trilho_signalr_connections — active SignalR connections
    # redis_connected_clients — Redis health

  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
