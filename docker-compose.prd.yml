# Ambiente PRD (produção)
# Uso: docker compose -f docker-compose.yml -f docker-compose.prd.yml up -d
# ATENÇÃO: nunca suba manualmente — use a pipeline de CI/CD

services:
  api:
    image: ghcr.io/${GH_OWNER}/trilho-api:${IMAGE_TAG}
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - Jwt__Secret=${JWT_SECRET}
      - AdminApiKey=${ADMIN_API_KEY}
      - Firebase__ProjectId=${FIREBASE_PROJECT_ID}
      - Firebase__ServiceAccountJson=${FIREBASE_SERVICE_ACCOUNT_JSON}
      - OlhoVivo__Token=${OLHOVIVO_TOKEN}
    ports:
      - "5000:8080"
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 256M
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "10"

  web:
    image: ghcr.io/${GH_OWNER}/trilho-web:${IMAGE_TAG}
    profiles: [web]
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - BACKEND_URL=http://api:8080
      - JWT_SECRET=${JWT_SECRET}
      - NEXT_PUBLIC_FIREBASE_API_KEY=${NEXT_PUBLIC_FIREBASE_API_KEY}
      - NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN}
      - NEXT_PUBLIC_FIREBASE_PROJECT_ID=${NEXT_PUBLIC_FIREBASE_PROJECT_ID}
      - NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=${NEXT_PUBLIC_GOOGLE_MAPS_API_KEY}
      - NEXT_PUBLIC_APP_URL=https://trilho.app
    depends_on:
      - api
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  admin:
    image: ghcr.io/${GH_OWNER}/trilho-admin:${IMAGE_TAG}
    profiles: [admin]
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - BACKEND_URL=http://api:8080
      - ADMIN_API_KEY=${ADMIN_API_KEY}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=https://admin.trilho.app
    depends_on:
      - api
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  db:
    environment:
      - POSTGRES_DB=trilho_prd
    volumes:
      - pgdata_prd:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G

  redis:
    command: redis-server --save "900 1" --save "300 10" --appendonly yes
    volumes:
      - redisdata_prd:/data
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  pgdata_prd:
  redisdata_prd:
