name: Deploy

on:
  push:
    branches:
      - develop   # → dsv
      - staging   # → hml
      - master    # → prd (requer aprovação no GitHub Environment)

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: false  # nunca cancela deploy em andamento

# ──────────────────────────────────────────────────────────────
# Mapeamento de branches → ambientes
#   develop  →  dsv   (deploy automático)
#   staging  →  hml   (deploy automático)
#   master   →  prd   (requer aprovação manual no GitHub)
# ──────────────────────────────────────────────────────────────

jobs:
  # ── 1. Determina o ambiente alvo ──────────────────────────
  setup:
    name: Configurar ambiente
    runs-on: ubuntu-latest
    outputs:
      env:          ${{ steps.map.outputs.env }}
      api-url:      ${{ steps.map.outputs.api-url }}
      compose-file: ${{ steps.map.outputs.compose-file }}
    steps:
      - id: map
        run: |
          case "${{ github.ref_name }}" in
            master)  ENV=prd  ;;
            staging) ENV=hml  ;;
            *)       ENV=dsv  ;;
          esac
          echo "env=$ENV"                         >> $GITHUB_OUTPUT
          echo "compose-file=docker-compose.$ENV.yml" >> $GITHUB_OUTPUT
          # As URLs de API são configuradas como secrets no GitHub Environment
          if   [ "$ENV" = "prd" ]; then echo "api-url=${{ secrets.PRD_API_URL }}" >> $GITHUB_OUTPUT
          elif [ "$ENV" = "hml" ]; then echo "api-url=${{ secrets.HML_API_URL }}" >> $GITHUB_OUTPUT
          else                          echo "api-url=${{ secrets.DSV_API_URL }}" >> $GITHUB_OUTPUT
          fi

  # ── 2. Build e push das imagens Docker ───────────────────
  build:
    name: Build imagens (${{ needs.setup.outputs.env }})
    runs-on: ubuntu-latest
    needs: setup
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ github.sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build e push — API (backend)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Trilho.API/Dockerfile
          push: true
          cache-from: type=gha,scope=api
          cache-to:   type=gha,scope=api,mode=max
          tags: |
            ghcr.io/${{ github.repository_owner }}/trilho-api:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/trilho-api:${{ needs.setup.outputs.env }}-latest

      - name: Build e push — web/
        if: ${{ hashFiles('web/Dockerfile') != '' }}
        uses: docker/build-push-action@v5
        with:
          context: ./web
          file: ./web/Dockerfile
          push: true
          cache-from: type=gha,scope=web
          cache-to:   type=gha,scope=web,mode=max
          tags: |
            ghcr.io/${{ github.repository_owner }}/trilho-web:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/trilho-web:${{ needs.setup.outputs.env }}-latest

      - name: Build e push — admin/
        if: ${{ hashFiles('admin/Dockerfile') != '' }}
        uses: docker/build-push-action@v5
        with:
          context: ./admin
          file: ./admin/Dockerfile
          push: true
          cache-from: type=gha,scope=admin
          cache-to:   type=gha,scope=admin,mode=max
          tags: |
            ghcr.io/${{ github.repository_owner }}/trilho-admin:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/trilho-admin:${{ needs.setup.outputs.env }}-latest

  # ── 3. Deploy no servidor via SSH ────────────────────────
  deploy:
    name: Deploy → ${{ needs.setup.outputs.env }}
    runs-on: ubuntu-latest
    needs: [setup, build]
    # Ativa o environment do GitHub (prd tem proteção com aprovação manual)
    environment: ${{ needs.setup.outputs.env }}

    steps:
      - uses: actions/checkout@v4

      - name: Copiar arquivos de configuração para o servidor
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key:      ${{ secrets.SSH_KEY }}
          source:   "docker-compose.yml,${{ needs.setup.outputs.compose-file }},scripts/deploy.sh"
          target:   "/opt/trilho"

      - name: Executar deploy no servidor
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key:      ${{ secrets.SSH_KEY }}
          envs: |
            IMAGE_TAG=${{ github.sha }}
            GH_OWNER=${{ github.repository_owner }}
            ENV=${{ needs.setup.outputs.env }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            ADMIN_API_KEY=${{ secrets.ADMIN_API_KEY }}
            FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}
            FIREBASE_SERVICE_ACCOUNT_JSON=${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
            OLHOVIVO_TOKEN=${{ secrets.OLHOVIVO_TOKEN }}
            NEXT_PUBLIC_FIREBASE_API_KEY=${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
            NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
            NEXT_PUBLIC_FIREBASE_PROJECT_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
            NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=${{ secrets.NEXT_PUBLIC_GOOGLE_MAPS_API_KEY }}
            NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}
          script: |
            set -euo pipefail
            cd /opt/trilho
            chmod +x scripts/deploy.sh
            bash scripts/deploy.sh \
              "$ENV" \
              "$IMAGE_TAG" \
              "$GH_OWNER"

  # ── 4. Smoke tests pós-deploy ────────────────────────────
  smoke:
    name: Smoke tests → ${{ needs.setup.outputs.env }}
    runs-on: ubuntu-latest
    needs: [setup, deploy]

    steps:
      - name: Health check da API
        run: |
          API_URL="${{ needs.setup.outputs.api-url }}"
          if [ -z "$API_URL" ]; then
            echo "⚠️  API_URL não configurada — pulando smoke test"
            exit 0
          fi

          echo "🔍 Testando $API_URL/health ..."
          for i in $(seq 1 10); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$API_URL/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✅ API saudável ($API_URL)"
              exit 0
            fi
            echo "  Tentativa $i/10 — status $STATUS, aguardando..."
            sleep 10
          done
          echo "❌ API não respondeu após 100s"
          exit 1

      - name: Verificar endpoint de linhas
        run: |
          API_URL="${{ needs.setup.outputs.api-url }}"
          if [ -z "$API_URL" ]; then exit 0; fi
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$API_URL/api/lines")
          [ "$STATUS" = "200" ] && echo "✅ GET /api/lines OK" || (echo "❌ GET /api/lines retornou $STATUS" && exit 1)

  # ── 5. Notificação de resultado ──────────────────────────
  notify:
    name: Notificação
    runs-on: ubuntu-latest
    needs: [setup, smoke]
    if: always()
    steps:
      - name: Resumo do deploy
        run: |
          ENV="${{ needs.setup.outputs.env }}"
          SMOKE="${{ needs.smoke.result }}"
          SHA="${{ github.sha }}"
          ACTOR="${{ github.actor }}"

          if [ "$SMOKE" = "success" ]; then
            echo "## ✅ Deploy em $ENV concluído" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ❌ Deploy em $ENV falhou" >> $GITHUB_STEP_SUMMARY
          fi
          echo "| Campo | Valor |"     >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|"     >> $GITHUB_STEP_SUMMARY
          echo "| Ambiente | \`$ENV\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit   | \`${SHA:0:7}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Por      | $ACTOR  |" >> $GITHUB_STEP_SUMMARY
