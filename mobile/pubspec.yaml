name: trilho
description: Trilho — lotação em tempo real do transporte público
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.0

  # Location (future use)
  geolocator: ^11.0.0
  geofence_service: ^5.0.0

  # Real-time
  signalr_netcore: ^1.3.6

  # Local storage
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.0.0

  # Monetization
  purchases_flutter: ^6.25.0
  google_mobile_ads: ^5.1.0

  # Charts
  fl_chart: ^0.68.0

  # Network
  cached_network_image: ^3.3.1
  dio: ^5.4.3+1

  # UI
  shimmer: ^3.0.0
  google_fonts: ^6.2.1

  # Utils
  intl: ^0.19.0
  path_provider: ^2.1.2
  home_widget: ^0.6.0
  share_plus: ^10.0.0

  # Firebase & Social Auth
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.9
  firebase_messaging: ^14.7.19
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.0
  flutter_facebook_auth: ^7.0.1
  crypto: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  riverpod_generator: ^2.4.3
  build_runner: ^2.4.9
  flutter_lints: ^3.0.0
  mockito: ^5.4.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/maps/
